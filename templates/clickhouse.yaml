---
apiVersion: clickhouse.com/v1alpha1
kind: ClickHouseCluster
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: 2
  keeperClusterRef:
    name: {{ .Release.Name }}-keeper
  containerTemplate:
    image:
      repository: {{ .Values.server.image.repository }}
      tag: {{ .Values.server.image.tag | quote }}
    {{- with .Values.resources }}
    resources:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  settings:
    defaultUserPassword:
      passwordType: password
      secret:
        name: clickhouse-secret
        key: default
    enableDatabaseSync: true
    extraUsersConfig:
      users:
        default:
          grants:
            - query: "GRANT ALL ON *.* WITH GRANT OPTION"
